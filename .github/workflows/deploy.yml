name: CICD with GitHub Actions

on:
  push:
    branches:
      - main

env:
  TF_STATE_BUCKET_NAME: ${{ secrets.AWS_TF_STATE_BUCKET_NAME }}
  PRIVATE_SSH_KEY: ${{ secrets.AWS_SSH_KEY_PRIVATE }}
  PUBLIC_SSH_KEY: ${{ secrets.AWS_SSH_KEY_PUBLIC }}
  AWS_REGION: ap-south-1

jobs:
  deploy-infra:
    runs-on: ubuntu-latest
    outputs:
      SERVER_PUBLIC_IP: ${{ steps.set_ip.outputs.instance_public_id }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2

      - name: Terraform Init
        run: |
          terraform init \
          -backend-config="bucket=${TF_STATE_BUCKET_NAME}" \
          -backend-config="key=terraform.tfstate" \
          -backend-config="region=${AWS_REGION}"
        working-directory: ./terraform

      - name: Terraform Plan
        run: |
          terraform plan \
          -var="region=${AWS_REGION}" \
          -var="public_key=${PUBLIC_SSH_KEY}" \
          -var="private_key=${PRIVATE_SSH_KEY}" \
          -var="key_name=deployer-key" \
          -out=PLAN
        working-directory: ./terraform

      - name: Terraform Apply
        run: terraform apply -auto-approve PLAN
        working-directory: ./terraform
      - name: Set Output
        id: set_ip
        run: echo "::set-output name=instance_public_id::$(terraform output instance_public_ip)"
  deploy-app:
    runs-on: ubuntu-latest
    needs: deploy-infra

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set IP env Variable
        run: echo "SERVER_PUBLIC_IP=${{ needs.deploy-infra.outputs.SERVER_PUBLIC_IP }}" >> $GITHUB_ENV

      - name: Login to AWS ECR
        uses: aws-actions/amazon-ecr-login@v1
      
      - name: Build and Push Docker Image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: example-node-app
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $REGISTRY/$REPOSITORY:$IMAGE_TAG .
          docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG

      - name: Deploy Docker image to EC2  
        env:
            REGISTRY: ${{ steps.login-ecr.outputs.registry }}
            REPOSITORY: example-node-app
            IMAGE_TAG: ${{ github.sha }}
            AWS_DEFAULT_REGION: ap-south-1
        uses: appleboy/ssh-action@master
        with:
          host: ${{ env.SERVER_PUBLIC_IP }}
          username: Ubuntu
          key: ${{ env.PRIVATE_SSH_KEY }}
          envs: |
            REGISTRY=${{ env.REGISTRY }}
            REPOSITORY=${{ env.REPOSITORY }}
            IMAGE_TAG=${{ env.IMAGE_TAG }}
            AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
            AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
            AWS_PRIVATE_SSH_KEY=${{ env.PRIVATE_SSH_KEY }}
            AWS_PUBLIC_SSH_KEY=${{ env.PUBLIC_SSH_KEY }}
            AWS_REGION=${{ env.AWS_REGION }}
          script: |
              sudo apt-get update
              sudo apt-get install -y docker.io
              sudo apt install -y awscli
              sudo ${aws ecr get-login --no-include-email --region $AWS_REGION}
              sudo docker stop myappcontainer || true
              sudo docker rm myappcontainer || true
              sudo docker pull $REGISTRY/$REPOSITORY:$IMAGE_TAG
              sudo docker run -d --name myappcontainer -p 80:8080 $$REGISTRY/$REPOSITORY:$IMAGE_TAG

          